name: Daily Auto Commit

on:
  schedule:
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  commit-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Make a change
        run: |
          echo "Updated on $(date)" >> log.txt

      - name: Commit changes - 24f3002855@ds.study.iitm.ac.in
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "24f3002855@ds.study.iitm.ac.in"
          git add .
          git commit -m "Daily auto commit" || echo "No changes"
          git push
